<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sketch</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{display:flex;flex-direction:column;height:100vh;overflow:hidden;background:#0a0a0a;font-family:'Inter',sans-serif}

    /* ── Toolbar ── */
    #toolbar{display:flex;align-items:center;gap:4px;padding:9px 14px;background:rgba(16,16,16,0.97);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
    .app-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:-0.3px;margin-right:6px;user-select:none}
    .sep{width:1px;height:20px;background:rgba(255,255,255,0.08);margin:0 6px;flex-shrink:0}
    .spacer{flex:1}

    /* Tool groups */
    .tool-group{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:3px}
    .toolbar-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:6px 11px;border:1px solid transparent;border-radius:7px;background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:12.5px;font-family:inherit;font-weight:500;transition:background .15s,color .15s,border-color .15s;white-space:nowrap;user-select:none}
    .toolbar-btn:hover:not(:disabled){background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.88)}
    .toolbar-btn.active{background:rgba(99,102,241,0.22);border-color:rgba(99,102,241,0.45);color:#a5b4fc}
    .toolbar-btn.ghost-active{background:rgba(249,115,22,0.2);border-color:rgba(249,115,22,0.5);color:#fb923c;text-shadow:0 0 8px rgba(249,115,22,0.8)}
    .toolbar-btn:disabled{opacity:.22;cursor:not-allowed}
    .toolbar-btn.danger:hover:not(:disabled){background:rgba(239,68,68,0.13);color:#fca5a5;border-color:rgba(239,68,68,0.28)}
    .toolbar-btn.accent:hover:not(:disabled){background:rgba(34,197,94,0.13);color:#86efac;border-color:rgba(34,197,94,0.28)}

    /* Width pills */
    .width-group{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:4px 5px}
    .width-btn{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;transition:background .15s,border-color .15s}
    .width-btn:hover{background:rgba(255,255,255,0.07)}
    .width-btn.active{background:rgba(99,102,241,0.22);border-color:rgba(99,102,241,0.45)}
    .width-dot{background:rgba(255,255,255,0.65);border-radius:50%;pointer-events:none}
    .width-btn.active .width-dot{background:#a5b4fc}

    /* ── Color picker button ── */
    .color-btn-wrap{position:relative}
    .color-btn{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 6px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(255,255,255,0.04);cursor:pointer;transition:border-color .15s,background .15s;user-select:none}
    .color-btn:hover{border-color:rgba(255,255,255,0.22);background:rgba(255,255,255,0.07)}
    .color-btn-dot{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.18);flex-shrink:0;transition:background .1s}
    .color-btn-label{font-size:11.5px;font-weight:500;color:rgba(255,255,255,0.5);letter-spacing:.2px}

    /* ── Color panel (popup) ── */
    .color-panel{position:absolute;top:calc(100% + 8px);left:0;z-index:999;background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px;width:220px;box-shadow:0 16px 48px rgba(0,0,0,0.7);display:none;flex-direction:column;gap:12px}
    .color-panel.open{display:flex}

    /* Gradient picker area */
    .cp-gradient{position:relative;width:100%;height:130px;border-radius:8px;cursor:crosshair;overflow:hidden;flex-shrink:0}
    .cp-gradient canvas{position:absolute;inset:0;width:100%;height:100%}
    .cp-cursor{position:absolute;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.5);transform:translate(-50%,-50%);pointer-events:none;top:0;left:100%}

    /* Hue slider */
    .cp-hue{width:100%;height:10px;border-radius:6px;cursor:pointer;background:linear-gradient(to right,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);position:relative;flex-shrink:0}
    .cp-hue-thumb{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,0.4);transform:translate(-50%,-50%);pointer-events:none;left:0}

    /* Preset swatches */
    .cp-swatches{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
    .cp-swatch{width:100%;aspect-ratio:1;border-radius:5px;cursor:pointer;border:1.5px solid transparent;transition:transform .1s,border-color .1s}
    .cp-swatch:hover{transform:scale(1.15);border-color:rgba(255,255,255,0.4)}

    /* Hex input */
    .cp-hex-row{display:flex;align-items:center;gap:8px}
    .cp-hex-preview{width:26px;height:26px;border-radius:6px;border:1.5px solid rgba(255,255,255,0.15);flex-shrink:0}
    .cp-hex-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;font-size:12px;font-family:inherit;padding:5px 8px;outline:none;letter-spacing:.5px}
    .cp-hex-input:focus{border-color:rgba(99,102,241,0.5)}

    /* ── Canvas ── */
    #canvas-container{flex:1;display:flex;justify-content:center;align-items:center;overflow:hidden;transition:background .3s;position:relative}
    #canvas{display:block;touch-action:none;border-radius:4px;box-shadow:0 0 0 1px rgba(255,255,255,0.06),0 24px 80px rgba(0,0,0,0.6);transition:background .3s}
  </style>
</head>
<body>

  <div id="toolbar">
    <span class="app-name">✦ Sketch</span>
    <div class="sep"></div>

    <!-- Tools -->
    <div class="tool-group">
      <button id="btn-pen" class="toolbar-btn active" data-tool="pen" title="Pen (P)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        Pen
      </button>
      <button id="btn-eraser" class="toolbar-btn" data-tool="eraser" title="Eraser (E)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6 11l7 7"/></svg>
        Eraser
      </button>
      <button id="btn-ghost" class="toolbar-btn" title="Ghost pen — strokes fade away (G)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        Ghost
      </button>
    </div>

    <div class="sep"></div>

    <!-- Stroke color picker -->
    <div class="color-btn-wrap" id="stroke-picker-wrap">
      <div class="color-btn" id="stroke-color-btn" title="Stroke color">
        <div class="color-btn-dot" id="stroke-dot" style="background:#ffffff"></div>
        <span class="color-btn-label">Stroke</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="color-panel" id="stroke-panel"></div>
    </div>

    <div class="sep"></div>

    <!-- Background color picker -->
    <div class="color-btn-wrap" id="bg-picker-wrap">
      <div class="color-btn" id="bg-color-btn" title="Canvas background">
        <div class="color-btn-dot" id="bg-dot" style="background:#0d0d0d"></div>
        <span class="color-btn-label">Background</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="color-panel" id="bg-panel"></div>
    </div>

    <div class="sep"></div>

    <!-- Stroke width -->
    <div class="width-group">
      <button class="width-btn active" data-width="2" title="Thin"><span class="width-dot" style="width:4px;height:4px"></span></button>
      <button class="width-btn" data-width="6" title="Medium"><span class="width-dot" style="width:8px;height:8px"></span></button>
      <button class="width-btn" data-width="14" title="Thick"><span class="width-dot" style="width:13px;height:13px"></span></button>
    </div>
    <select id="stroke-width" style="display:none">
      <option value="2" selected>S</option>
      <option value="6">M</option>
      <option value="14">L</option>
    </select>

    <div class="sep"></div>

    <!-- Actions -->
    <div class="tool-group">
      <button id="btn-undo" class="toolbar-btn" title="Undo (Ctrl+Z)" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3 13C5.5 6.5 14 4 20 8"/></svg>
        Undo
      </button>
      <button id="btn-redo" class="toolbar-btn" title="Redo (Ctrl+Y)" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M21 13C18.5 6.5 10 4 4 8"/></svg>
        Redo
      </button>
      <button id="btn-clear" class="toolbar-btn danger" title="Clear canvas">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Clear
      </button>
    </div>

    <div class="spacer"></div>

    <button id="btn-export" class="toolbar-btn accent" title="Export as PNG">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>

    <div class="sep"></div>

    <!-- Zoom controls -->
    <div class="tool-group">
      <button class="toolbar-btn" id="btn-zoom-out" title="Zoom out">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
      <span id="zoom-label" title="Ctrl+0 to reset" style="font-size:11.5px;font-weight:500;color:rgba(255,255,255,0.45);min-width:36px;text-align:center;cursor:pointer;user-select:none">100%</span>
      <button class="toolbar-btn" id="btn-zoom-in" title="Zoom in">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      </button>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="canvas"></canvas>
    <canvas id="ghost-canvas" style="position:absolute;inset:0;pointer-events:none;border-radius:4px"></canvas>
  </div>

  <!-- Hidden inputs kept for ToolbarController compatibility -->
  <input id="color-picker" type="color" value="#ffffff" style="display:none" />

  <script type="module" src="src/main.js"></script>

  <script type="module">
  // ── Utility: HSV ↔ RGB / Hex ──────────────────────────────────────────────
  function hsvToRgb(h, s, v) {
    const f = (n, k = (n + h / 60) % 6) => v - v * s * Math.max(0, Math.min(k, 4 - k, 1));
    return [Math.round(f(5) * 255), Math.round(f(3) * 255), Math.round(f(1) * 255)];
  }
  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
  }
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return [r, g, b];
  }
  function rgbToHsv(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;
    let h = 0;
    if (d) {
      if (max === r) h = ((g - b) / d + 6) % 6;
      else if (max === g) h = (b - r) / d + 2;
      else h = (r - g) / d + 4;
      h *= 60;
    }
    return [h, max ? d / max : 0, max];
  }

  const PRESETS = [
    '#ffffff','#e2e8f0','#94a3b8','#475569',
    '#f87171','#fb923c','#fbbf24','#a3e635',
    '#34d399','#22d3ee','#818cf8','#e879f9',
    '#0d0d0d','#1e293b','#0f172a','#000000',
  ];

  // ── Build a color panel ────────────────────────────────────────────────────
  function buildPanel(panelEl, initialHex, onChange) {
    let [hue, sat, val] = rgbToHsv(...hexToRgb(initialHex));
    let draggingGrad = false, draggingHue = false;

    panelEl.innerHTML = '';

    // Gradient canvas
    const gradWrap = document.createElement('div');
    gradWrap.className = 'cp-gradient';
    const gradCanvas = document.createElement('canvas');
    gradCanvas.width = 192; gradCanvas.height = 130;
    const cursor = document.createElement('div');
    cursor.className = 'cp-cursor';
    gradWrap.append(gradCanvas, cursor);

    // Hue slider
    const hueTrack = document.createElement('div');
    hueTrack.className = 'cp-hue';
    const hueThumb = document.createElement('div');
    hueThumb.className = 'cp-hue-thumb';
    hueTrack.appendChild(hueThumb);

    // Swatches
    const swatchGrid = document.createElement('div');
    swatchGrid.className = 'cp-swatches';
    PRESETS.forEach(hex => {
      const s = document.createElement('div');
      s.className = 'cp-swatch';
      s.style.background = hex;
      s.title = hex;
      s.addEventListener('click', () => {
        [hue, sat, val] = rgbToHsv(...hexToRgb(hex));
        update(); emit();
      });
      swatchGrid.appendChild(s);
    });

    // Hex input row
    const hexRow = document.createElement('div');
    hexRow.className = 'cp-hex-row';
    const hexPreview = document.createElement('div');
    hexPreview.className = 'cp-hex-preview';
    const hexInput = document.createElement('input');
    hexInput.className = 'cp-hex-input';
    hexInput.maxLength = 7;
    hexInput.spellcheck = false;
    hexRow.append(hexPreview, hexInput);

    panelEl.append(gradWrap, hueTrack, swatchGrid, hexRow);

    // Draw gradient
    function drawGrad() {
      const ctx = gradCanvas.getContext('2d');
      const W = gradCanvas.width, H = gradCanvas.height;
      const baseColor = `hsl(${hue},100%,50%)`;
      const gH = ctx.createLinearGradient(0, 0, W, 0);
      gH.addColorStop(0, '#fff'); gH.addColorStop(1, baseColor);
      ctx.fillStyle = gH; ctx.fillRect(0, 0, W, H);
      const gV = ctx.createLinearGradient(0, 0, 0, H);
      gV.addColorStop(0, 'transparent'); gV.addColorStop(1, '#000');
      ctx.fillStyle = gV; ctx.fillRect(0, 0, W, H);
    }

    function update() {
      drawGrad();
      const W = gradCanvas.offsetWidth || gradCanvas.width;
      const H = gradCanvas.offsetHeight || gradCanvas.height;
      cursor.style.left = (sat * W) + 'px';
      cursor.style.top = ((1 - val) * H) + 'px';
      hueThumb.style.left = (hue / 360 * 100) + '%';
      const hex = rgbToHex(...hsvToRgb(hue, sat, val));
      hexInput.value = hex;
      hexPreview.style.background = hex;
    }

    function emit() {
      const hex = rgbToHex(...hsvToRgb(hue, sat, val));
      onChange(hex);
    }

    // Gradient drag
    function onGradPointer(e) {
      const rect = gradCanvas.getBoundingClientRect();
      sat = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      val = Math.max(0, Math.min(1, 1 - (e.clientY - rect.top) / rect.height));
      update(); emit();
    }
    gradWrap.addEventListener('pointerdown', e => { draggingGrad = true; gradWrap.setPointerCapture(e.pointerId); onGradPointer(e); });
    gradWrap.addEventListener('pointermove', e => { if (draggingGrad) onGradPointer(e); });
    gradWrap.addEventListener('pointerup', () => { draggingGrad = false; });

    // Hue drag
    function onHuePointer(e) {
      const rect = hueTrack.getBoundingClientRect();
      hue = Math.max(0, Math.min(360, ((e.clientX - rect.left) / rect.width) * 360));
      update(); emit();
    }
    hueTrack.addEventListener('pointerdown', e => { draggingHue = true; hueTrack.setPointerCapture(e.pointerId); onHuePointer(e); });
    hueTrack.addEventListener('pointermove', e => { if (draggingHue) onHuePointer(e); });
    hueTrack.addEventListener('pointerup', () => { draggingHue = false; });

    // Hex input
    hexInput.addEventListener('input', () => {
      const v = hexInput.value.trim();
      if (/^#[0-9a-fA-F]{6}$/.test(v)) {
        [hue, sat, val] = rgbToHsv(...hexToRgb(v));
        update(); emit();
      }
    });

    update();
    return { setColor(hex) { [hue, sat, val] = rgbToHsv(...hexToRgb(hex)); update(); } };
  }

  // ── Wire stroke color picker ───────────────────────────────────────────────
  let strokeColor = '#ffffff';
  const strokeDot = document.getElementById('stroke-dot');
  const strokePanel = document.getElementById('stroke-panel');
  const strokePanelCtrl = buildPanel(strokePanel, strokeColor, hex => {
    strokeColor = hex;
    strokeDot.style.background = hex;
    const inp = document.getElementById('color-picker');
    inp.value = hex;
    inp.dispatchEvent(new Event('input', { bubbles: true }));
    inp.dispatchEvent(new Event('change', { bubbles: true }));
  });

  // Add hidden color input for ToolbarController compatibility — already in HTML

  document.getElementById('stroke-color-btn').addEventListener('click', e => {
    e.stopPropagation();
    strokePanel.classList.toggle('open');
    bgPanel.classList.remove('open');
  });

  // ── Wire background color picker ──────────────────────────────────────────
  let bgColor = '#0d0d0d';
  const bgDot = document.getElementById('bg-dot');
  const bgPanel = document.getElementById('bg-panel');
  const canvas = document.getElementById('canvas');
  const canvasContainer = document.getElementById('canvas-container');
  canvas.style.background = bgColor;
  canvasContainer.style.background = bgColor;

  buildPanel(bgPanel, bgColor, hex => {
    bgColor = hex;
    bgDot.style.background = hex;
    canvas.style.background = hex;
    canvasContainer.style.background = hex;
  });

  document.getElementById('bg-color-btn').addEventListener('click', e => {
    e.stopPropagation();
    bgPanel.classList.toggle('open');
    strokePanel.classList.remove('open');
  });

  // Close panels on outside click
  document.addEventListener('click', () => {
    strokePanel.classList.remove('open');
    bgPanel.classList.remove('open');
  });
  strokePanel.addEventListener('click', e => e.stopPropagation());
  bgPanel.addEventListener('click', e => e.stopPropagation());

  // ── Width pills ───────────────────────────────────────────────────────────
  const widthBtns = document.querySelectorAll('.width-btn');
  const widthSelect = document.getElementById('stroke-width');
  widthBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      widthBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      widthSelect.value = btn.dataset.width;
      widthSelect.dispatchEvent(new Event('change'));
    });
  });

  // ── Keyboard shortcuts ────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); document.getElementById('btn-undo').click(); }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); document.getElementById('btn-redo').click(); }
    if (e.key === 'p' || e.key === 'P') document.getElementById('btn-pen').click();
    if (e.key === 'e' || e.key === 'E') document.getElementById('btn-eraser').click();
    if (e.key === 'g' || e.key === 'G') document.getElementById('btn-ghost').click();
  });
  </script>
</body>
</html>
